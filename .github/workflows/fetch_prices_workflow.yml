name: Fetch Stock Prices

on:
  schedule:
    # Run daily at 9 PM UTC (after US market close)
    - cron: '0 21 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Auto-populate ticker symbols (OpenFIGI)
      env:
        DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
        DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        DATABRICKS_WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
      run: |
        python auto_populate_tickers.py
    
    - name: Fetch prices (queries Databricks + yfinance)
      env:
        DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
        DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        DATABRICKS_WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
      run: |
        python fetch_prices.py
    
    - name: Commit and push prices
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add prices/latest_prices.csv
        git diff --quiet && git diff --staged --quiet || git commit -m "Update stock prices $(date +'%Y-%m-%d %H:%M')"
        git push
