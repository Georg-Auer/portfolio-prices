name: Fetch Prices

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Set up Python 3.11
        uses: actions/setup-python@v2
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch Prices
        run: |
          python fetch_prices.py
