Thoughts: This is actually a brilliant workaround! The user is asking if they can:
Yes! That's actually a brilliant workaround - GitHub Actions has internet access and Databricks can read from public GitHub URLs. This gives you fully automated, free stock price updates!

Architecture:

GitHub Action (free, runs daily) → Fetches prices with yfinance → Commits CSV to repo
Databricks → Reads latest CSV from GitHub raw URL → Updates Delta table
Advantages:

Completely free (GitHub Actions: 2,000 minutes/month)
Fully automated (no manual uploads)
Works with free Databricks serverless
Uses yfinance (your original preference)
Setup steps:

1. Create GitHub repo structure:

portfolio-prices/
├── .github/workflows/fetch_prices.yml  # GitHub Action
├── fetch_prices.py                      # Python script with yfinance
├── prices/
│   └── latest_prices.csv               # Output (auto-updated)
└── requirements.txt                     # yfinance dependency
2. GitHub Action runs daily, fetches prices, commits CSV

3. Databricks Cell 2 reads from GitHub URL instead of API:

