will this only work if my warehouse is running?
Thoughts: The user is asking if the GitHub Action will only work if their SQL Warehouse is running. They've shared their warehouse ID: `1d7cbdd33554905b`.
No! The warehouse does NOT need to be running. SQL Warehouses support auto-start - when the GitHub Action sends a query, the warehouse will automatically start up, run the query, then auto-stop.

Your Warehouse ID is: 1d7cbdd33554905b

Here's what happens:

GitHub Action runs at 9 PM UTC
Sends query to Databricks → Warehouse is stopped
Warehouse auto-starts (~30-60 seconds to start)
Runs the query (fetches ticker list)
Warehouse auto-stops after idle timeout (usually 10-20 minutes)
What you should verify in Databricks:

Go to SQL → SQL Warehouses
Click on your warehouse (1d7cbdd33554905b)
Click Edit (top right)
Make sure these settings are enabled:
✅ Auto Stop: Enabled (e.g., after 10 minutes of inactivity)
✅ Auto Start: This is enabled by default
Click Save
Cost implications (if using paid tier):

Free tier: No cost for serverless SQL
Paid tier: You only pay for ~1-2 minutes of warehouse runtime per day (query is fast)
