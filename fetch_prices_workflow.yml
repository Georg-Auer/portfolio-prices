Step 2: Convert All Prices to EUR

latest_prices = latest_prices.withColumn(
    "current_price_eur",
    when(col("price_currency") == "USD", col("price_original") * lit(usd_to_eur))  # USD → EUR
    .when(col("price_currency") == "EUR", col("price_original"))  # EUR stays
    .when(col("price_currency") == "GBP", col("price_original") * lit(1.17))  # GBP → EUR
    .otherwise(col("price_original") * lit(usd_to_eur))
)
